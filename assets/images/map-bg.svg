<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c87a"/>
      <stop offset="0.5" stop-color="#c8a45c"/>
      <stop offset="1" stop-color="#8a6d3b"/>
    </linearGradient>
    <radialGradient id="vign" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#16130c" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#0a0a0c" stop-opacity="0.85"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.14"/>
    </pattern>
  </defs>

  <!-- 底纹：经纬网格 -->
  <rect x="0" y="0" width="1000" height="1000" fill="url(#grid)"/>

  <!-- 外框 + 角饰 -->
  <rect x="30" y="30" width="940" height="940" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.85"/>
  <rect x="44" y="44" width="912" height="912" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.45"/>
  <g fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7">
    <circle cx="30" cy="30" r="10"/><circle cx="970" cy="30" r="10"/>
    <circle cx="30" cy="970" r="10"/><circle cx="970" cy="970" r="10"/>
  </g>

  <!-- 华夏陆形（写意） -->
  <path d="M470 195
           C540 170 620 175 690 200
           C740 218 800 235 815 285
           C828 320 805 345 820 380
           C835 415 830 450 805 470
           C835 500 825 540 790 580
           C820 610 815 650 775 685
           C740 720 700 760 650 800
           C600 835 540 838 500 815
           C470 798 450 790 430 775
           C390 760 350 752 320 738
           C280 720 245 700 222 665
           C195 625 178 590 188 552
           C165 515 150 478 168 440
           C150 405 152 368 178 345
           C200 322 232 318 258 322
           C285 300 320 285 345 262
           C380 230 420 210 470 195 Z"
        fill="#13110b" fill-opacity="0.92" stroke="url(#gold)" stroke-width="2.4" opacity="0.9"/>
  <!-- 陆内淡描边 -->
  <path d="M470 195
           C540 170 620 175 690 200
           C740 218 800 235 815 285
           C828 320 805 345 820 380
           C835 415 830 450 805 470
           C835 500 825 540 790 580
           C820 610 815 650 775 685
           C740 720 700 760 650 800
           C600 835 540 838 500 815
           C470 798 450 790 430 775
           C390 760 350 752 320 738
           C280 720 245 700 222 665
           C195 625 178 590 188 552
           C165 515 150 478 168 440
           C150 405 152 368 178 345
           C200 322 232 318 258 322
           C285 300 320 285 345 262
           C380 230 420 210 470 195 Z"
        fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.35" transform="translate(6 6) scale(0.988)"/>

  <!-- 西部山脉 -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.55">
    <path d="M205 560 l10 -18 l10 18 M225 575 l10 -18 l10 18 M245 560 l10 -18 l10 18"/>
    <path d="M260 600 l9 -16 l9 16 M278 612 l9 -16 l9 16"/>
    <path d="M200 620 l9 -15 l9 15"/>
  </g>

  <!-- 长江 -->
  <path d="M245 650 C350 662 430 692 520 662 C620 628 690 600 792 560"
        fill="none" stroke="url(#gold)" stroke-width="2.2" opacity="0.6"/>
  <!-- 黄河 -->
  <path d="M232 442 C320 472 360 542 442 522 C540 498 600 452 660 478 C720 500 762 498 806 462"
        fill="none" stroke="url(#gold)" stroke-width="2.2" opacity="0.6"/>

  <!-- 海域标注 -->
  <g fill="url(#gold)" opacity="0.4" font-family="serif" font-size="20" letter-spacing="4">
    <text x="838" y="640">东海</text>
    <text x="430" y="892">南海</text>
    <text x="150" y="500">西域</text>
  </g>

  <!-- 罗盘（右上） -->
  <g transform="translate(872 132)" opacity="0.85">
    <circle r="52" fill="#0d0b08" fill-opacity="0.6" stroke="url(#gold)" stroke-width="2"/>
    <circle r="40" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
    <path d="M0 -46 L9 0 L0 46 L-9 0 Z" fill="url(#gold)" opacity="0.9"/>
    <path d="M-46 0 L0 -9 L46 0 L0 9 Z" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.8"/>
    <g fill="url(#gold)" font-family="serif" font-size="16" text-anchor="middle">
      <text x="0" y="-30">北</text>
      <text x="0" y="42">南</text>
      <text x="34" y="6">东</text>
      <text x="-34" y="6">西</text>
    </g>
  </g>

  <!-- 祥云（左上、右下） -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.6" opacity="0.5">
    <path d="M120 120 c0 -18 26 -18 26 0 c0 -18 26 -18 26 0 c10 0 10 16 -4 16 l-44 0 c-14 0 -14 -16 -4 -16 Z"/>
    <path d="M860 880 c0 -16 22 -16 22 0 c0 -16 22 -16 22 0 c8 0 8 14 -4 14 l-38 0 c-12 0 -12 -14 -4 -14 Z"/>
  </g>

  <!-- 题署 -->
  <g opacity="0.8">
    <rect x="92" y="872" width="118" height="40" fill="#0d0b08" fill-opacity="0.55" stroke="url(#gold)" stroke-width="1.2"/>
    <text x="151" y="899" fill="url(#gold)" font-family="serif" font-size="24" letter-spacing="6" text-anchor="middle">山海舆图</text>
  </g>

  <!-- 暗角 -->
  <rect x="0" y="0" width="1000" height="1000" fill="url(#vign)"/>
</svg>
